<!DOCTYPE html>
<html>

<head>
    <title>Doctor Login</title>
    <link rel="stylesheet" href="stylep.css.css">
</head>

<body>

    <div class="main" style="margin-left:0; display:flex; justify-content:center; align-items:center; height:100vh;">

        <div class="card" style="width:450px;">

            <h2 style="text-align:center;">Doctor Login</h2>

            <!-- LOGIN FORM -->
            <form id="loginForm">

                <label>Email</label>
                <input type="email" id="loginEmail" required>

                <label>Password</label>
                <input type="password" id="loginPassword" required>

                <button type="button" id="loginButton" style="margin-top:15px;">Login</button>

            </form>

            <p id="loginMessage" style="color:red; text-align:center;"></p>

        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            // LOGIN
            document.getElementById("loginButton").addEventListener("click", function () {
                window.location.href = "doctordashboard.html";
            });

        });
    </script>

</body>

</html>
