<!DOCTYPE html>
<html>
<head>
    <title>Add Treatment</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <h2>Doctor Panel</h2>
    <a href="doctordashboard.html">Dashboard</a>
    <a href="doctorappointment.html">Appointments</a>
    <a href="doctorpatients.html">Patients</a>
    <a href="addtreatment.html">Add Treatment</a>
    <a href="editprofile.html">Edit Profile</a>
</div>

<div class="main">
    <h1>Add Treatment Record</h1>

    <div class="card">
        <form id="treatmentForm">

            <label>Patient ID</label>
            <input type="text" id="patientId" required>

            <label>Diagnosis</label>
            <textarea id="diagnosis" required></textarea>

            <label>Prescription</label>
            <textarea id="prescription" required></textarea>

            <label>Notes</label>
            <textarea id="notes"></textarea>

            <label>Follow-up Date</label>
            <input type="date" id="followup" required>

            <button type="submit">Save Record</button>

        </form>

        <p id="successMessage" style="color:green; margin-top:10px;"></p>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("treatmentForm");

    form.addEventListener("submit", function (event) {

        event.preventDefault(); // stop page refresh

        const patientId = document.getElementById("patientId").value;
        const diagnosis = document.getElementById("diagnosis").value;
        const prescription = document.getElementById("prescription").value;
        const notes = document.getElementById("notes").value;
        const followup = document.getElementById("followup").value;

        let treatments = JSON.parse(localStorage.getItem("treatments")) || [];

        treatments.push({
            patientId,
            diagnosis,
            prescription,
            notes,
            followup
        });

        localStorage.setItem("treatments", JSON.stringify(treatments));

        document.getElementById("successMessage").innerText =
            "Treatment Record Saved Successfully!";

        form.reset();
    });

});
</script>

</body>
</html>
