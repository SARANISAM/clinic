<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login | AstraCare Clinic</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen flex items-center justify-center p-6 text-white overflow-hidden">

    <!-- Background Decorations -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600 opacity-5 blur-[100px]"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-600 opacity-5 blur-[100px]"></div>
    </div>

    <div class="max-w-md w-full glass rounded-[2.5rem] p-12 shadow-2xl fade-in relative z-10">
        <!-- Back Button -->
        <a href="index.html" class="absolute top-8 left-8 text-slate-400 hover:text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </a>

        <div class="text-center mb-10">
            <div
                class="w-20 h-20 gold-accent rounded-3xl mx-auto flex items-center justify-center shadow-lg mb-6 rotate-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-slate-900" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">Admin Portal</h1>
            <p class="text-slate-400 mt-2 text-sm font-light">Secure Access for AstraCare Administrators</p>
        </div>

        <form class="space-y-6">
            <div>
                <label
                    class="block text-xs font-semibold uppercase tracking-widest text-slate-500 mb-2 ml-1">Username</label>
                <input type="text" class="w-full py-4 px-6 rounded-2xl input-field text-white" placeholder="admin_user">
            </div>
            <div>
                <label
                    class="block text-xs font-semibold uppercase tracking-widest text-slate-500 mb-2 ml-1">Password</label>
                <input type="password" class="w-full py-4 px-6 rounded-2xl input-field text-white"
                    placeholder="••••••••">
            </div>

            <div class="flex items-center text-xs pt-2">
                <label class="flex items-center text-slate-500 cursor-pointer hover:text-white transition-colors">
                    <input type="checkbox" class="mr-2 rounded border-white/10 bg-white/5"> Remember device
                </label>
            </div>

            <button type="button"
                onclick="window.location.href='dashboard.html';"
                class="w-full py-5 rounded-2xl premium-gradient text-white font-bold shadow-xl hover:shadow-gold-500/10 hover:scale-[1.02] transition-all duration-300 mt-4 active:scale-[0.98]">
                Authenticate
            </button>
        </form>

        <p class="text-center mt-10 text-[10px] text-slate-600 uppercase tracking-widest">
            &copy; 2026 Powered by AstraCare Security
        </p>
    </div>

</body>

</html>
