<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Appointment Management - AstraCare</title>
  <link rel="stylesheet" href="stylereception.css" />
</head>

<body>
  <header>
    <h1>AstraCare Medical Center</h1>
    <p>Receptionist - Appointment Management</p>
  </header>

  <main>
    <a href="dashr.html" class="back-button">
      <span class="nav-icon">←</span> Back to Dashboard
    </a>

    <h2>Book New Appointment</h2>
    <form onsubmit="addAppointment(event)">
      <select id="patientId" required>
        <option value="">Select Patient*</option>
      </select>

      <select id="doctorId" required>
        <option value="">Select Doctor*</option>
      </select>

      <input type="date" id="date" required />
      <input type="time" id="time" required />
      <textarea id="reason" placeholder="Reason for Visit / Symptoms (optional)"></textarea>

      <button type="submit">Book Appointment</button>
    </form>

    <p id="message"></p>

    <h3>Appointment Records</h3>
    <p style="font-size: 0.9em; color: #666; margin-bottom: 10px;">
      🟢 Saved to database | 🟡 Saved locally only
    </p>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Time</th>
          <th>Patient Name</th>
          <th>Doctor Name</th>
          <th>Reason</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="appointmentTable">
      </tbody>
    </table>
  </main>

  <script>
    const API = "https://clinic-tm9b.onrender.com";

    const patientMap = {};
    const doctorMap = {};

    // ── LOAD PATIENTS AND DOCTORS ──
    async function loadDropdowns() {
      try {
        console.log("Loading dropdowns...");
        const [patRes, docRes] = await Promise.all([
          fetch(`${API}/patients`),
          fetch(`${API}/doctors`)
        ]);

        console.log("Patient response status:", patRes.status);
        console.log("Doctor response status:", docRes.status);

        if (!patRes.ok) {
          throw new Error(`Failed to load patients: ${patRes.status}`);
        }
        if (!docRes.ok) {
          throw new Error(`Failed to load doctors: ${docRes.status}`);
        }

        const patients = await patRes.json();
        const doctors = await docRes.json();

        console.log("Patients loaded:", patients);
        console.log("Doctors loaded:", doctors);

        const patSelect = document.getElementById("patientId");
        // Clear existing options except the first one
        patSelect.innerHTML = '<option value="">Select Patient*</option>';
        patients.forEach(p => {
          patientMap[p.patient_id] = p.name;
          const opt = document.createElement("option");
          opt.value = p.patient_id;
          opt.textContent = p.name;
          patSelect.appendChild(opt);
        });

        const docSelect = document.getElementById("doctorId");
        const docData = doctors.data || doctors;
        console.log("Doctor data received:", docData);

        // Clear existing options except the first one
        docSelect.innerHTML = '<option value="">Select Doctor*</option>';

        const doctorNames = JSON.parse(localStorage.getItem("doctorNames")) || {};
        docData.forEach(d => {
          console.log("Processing doctor:", d);

          // Skip doctors that don't have proper database identifiers
          if (!d.doctor_id && !d.id && !d.user_id) {
            console.warn("Skipping doctor with no valid ID:", d);
            return;
          }

          const emailPrefix = d.email && d.email.includes('@') ? d.email.split('@')[0] : "";
          const dName = doctorNames[d.user_id] || d.name || emailPrefix || d.user_id || "Unknown Doctor";

          // Use doctor_id as primary key if available, otherwise use id, then user_id
          // This ensures we use the actual database primary key for foreign key relationships
          const doctorKey = d.doctor_id || d.id || d.user_id;
          doctorMap[doctorKey] = dName;

          console.log(`Doctor ${dName}: using key ${doctorKey} (doctor_id: ${d.doctor_id}, id: ${d.id}, user_id: ${d.user_id})`);

          const opt = document.createElement("option");
          opt.value = doctorKey;
          opt.textContent = dName + " (" + (d.specialization || "General") + ")";
          docSelect.appendChild(opt);
        });

        console.log("Final doctorMap:", doctorMap);

      } catch (err) {
        console.error("Error loading dropdowns:", err);
        // Show error in the UI
        const message = document.getElementById("message");
        message.style.color = "red";
        message.innerText = `❌ Error loading data: ${err.message}`;
      }
    }

    // ── LOAD APPOINTMENTS ──
    function loadAppointments() {
      const table = document.getElementById("appointmentTable");
      const appointments = JSON.parse(localStorage.getItem("allAppointments")) || [];

      table.innerHTML = "";

      if (!appointments.length) {
        table.innerHTML = '<tr><td colspan="6" style="text-align:center;">No appointments found.</td></tr>';
        return;
      }

      appointments.forEach(a => {
        const pName = patientMap[a.patient_id] || a.patientName || "Unknown Patient";
        const dName = doctorMap[a.doctor_id] || a.doctorName || "Unknown Doctor";
        const reasonValue = a.reason || "—";
        const statusIndicator = a.saved_to_server ? " 🟢" : " 🟡"; // Green dot for server-saved, yellow for local-only

        table.innerHTML += `
      <tr>
        <td>${a.appointment_date}</td>
        <td>${a.appointment_time || "—"}</td>
        <td>${pName}</td>
        <td>${dName}</td>
        <td>${reasonValue}</td>
        <td>${a.status || "Scheduled"}${statusIndicator}</td>
      </tr>
    `;
      });
    }

    // ── ADD APPOINTMENT ──
    async function addAppointment(event) {
      event.preventDefault();

      const patient_id = document.getElementById("patientId").value;
      const doctor_id = document.getElementById("doctorId").value;
      const appointment_date = document.getElementById("date").value;
      const appointment_time = document.getElementById("time").value;
      const reason = document.getElementById("reason").value;
      const message = document.getElementById("message");

      // Validation
      if (!patient_id || !doctor_id) {
        message.style.color = "red";
        message.innerText = "❌ Please select both patient and doctor";
        return;
      }

      console.log("Attempting to create appointment:", {
        patient_id,
        doctor_id,
        appointment_date,
        appointment_time,
        reason
      });

      try {
        // Use the correct backend endpoint that matches the server code
        const apiUrl = `${API}/appointments`;
        console.log("Making POST request to:", apiUrl);
        console.log("Sending data:", {
          patient_id,
          doctor_id,
          appointment_date,
          appointment_time
        });

        const res = await fetch(apiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            patient_id,
            doctor_id,
            appointment_date,
            appointment_time
            // Note: status and reason are not sent as backend sets status to "Booked"
          })
        });

        console.log("Response status:", res.status);
        console.log("Response ok:", res.ok);

        let server_app_id = "";
        if (res.ok) {
           const result = await res.json();
           console.log("Server response:", result);

           // Backend returns the inserted appointment data directly from Supabase
           // It should be an array with one appointment object
           if (Array.isArray(result) && result.length > 0) {
             server_app_id = result[0].appointment_id;
           } else if (result && result.appointment_id) {
             server_app_id = result.appointment_id;
           }

           console.log("Appointment saved to server with ID:", server_app_id);
        } else {
          const errorText = await res.text();
          console.error("Server error response:", errorText);

          // Try to parse error details
          let errorDetails = "";
          try {
            const errorData = JSON.parse(errorText);
            errorDetails = errorData.message || errorData.details || errorText;
          } catch (e) {
            errorDetails = errorText;
          }

          message.style.color = "red";
          message.innerText = `❌ Database Error: ${errorDetails}`;
          return; // Don't save locally if server explicitly rejected
        }

        // Only save locally if server save was successful
        const appointments = JSON.parse(localStorage.getItem("allAppointments")) || [];
        const newApp = {
          appointment_id: server_app_id, // Use the server-generated ID
          patient_id,
          patientName: patientMap[patient_id],
          doctor_id,
          doctorName: doctorMap[doctor_id],
          appointment_date,
          appointment_time,
          reason, // Store the reason locally even though backend doesn't use it
          status: "Booked", // Match backend default status
          saved_to_server: true // Mark as successfully saved to server
        };

        appointments.push(newApp);
        localStorage.setItem("allAppointments", JSON.stringify(appointments));

        // Also sync with doctor's simplified lists
        const doctorAppts = JSON.parse(localStorage.getItem("appointmentList")) || [];
        doctorAppts.push({
          appointment_id: server_app_id,
          name: patientMap[patient_id],
          date: appointment_date + " " + appointment_time,
          status: "Booked" // Match backend status
        });
        localStorage.setItem("appointmentList", JSON.stringify(doctorAppts));
        localStorage.setItem("appointments", JSON.stringify(doctorAppts));

        message.style.color = "green";
        message.innerText = `✅ Appointment Added & Saved to Database! (ID: ${server_app_id})`;
        event.target.reset();
        loadAppointments();

      } catch (err) {
        message.style.color = "red";
        message.innerText = "❌ Error adding appointment";
      }
    }

    // 🚀 INITIAL LOAD
    async function init() {
      await loadDropdowns();
      loadAppointments();
    }

    init();

  </script>
</body>

</html>
