<!DOCTYPE html>
<html>

<head>
    <title>Doctor Dashboard</title>
    <link rel="stylesheet" href="stylep.css">
</head>

<body>

    <div class="sidebar">
        <h2>Doctor Panel</h2>
        <a href="doctordashboard.html">Dashboard</a>
        <a href="doctorappointment.html">Appointment</a>
        <a href="doctorpatients.html">Patients</a>
        <a href="addtreatment.html">Add Treatment</a>
        
    </div>

    <div class="main">
        <h1 id="welcomeMsg">Welcome Doctor 👨‍⚕️</h1>

        <div class="card">
            <h3>Today's Appointments</h3>
            <p id="appointmentCount">Loading...</p>
        </div>

        <div class="card">
            <h3>Total Patients</h3>
            <p id="patientCount">Loading...</p>
        </div>

        <!-- logout / back to login button -->
        <button onclick="logout()" style="margin-top: 20px; padding: 10px 16px;">
            Logout / Back to Login
        </button>
    </div>

    <script>
        const API = "https://clinic-tm9b.onrender.com";

      

document.addEventListener("DOMContentLoaded", async function () {

    const doctor = JSON.parse(localStorage.getItem("doctor"));

    if (!doctor) {
        window.location.href = "indexpooja.html";
        return;
    }

    // Doctor name
    const name = doctor.name || doctor.user_id || "Doctor";
    document.getElementById("welcomeMsg").textContent =
        "Welcome, Dr. " + name + " 👨‍⚕️";

    // Doctor IDs
    const doctorInfo = Array.isArray(doctor.doctors)
        ? doctor.doctors[0]
        : (doctor.doctors || {});

    const docUserId = doctor.user_id || doctor.name;
    const docDocId = doctorInfo.doctor_id;

    const doctorIds = new Set([docUserId, docDocId].filter(Boolean));

    const today = new Date();
    const todayStr = today.toISOString().split("T")[0];

    let allAppointments = [];

    try {
        // ✅ 1. FETCH TODAY'S APPOINTMENTS (for count)
        const todayRes = await fetch(`${API}/appointments/${todayStr}`);
        let todayApps = [];

        if (todayRes.ok) {
            const data = await todayRes.json();
            todayApps = data.filter(a => doctorIds.has(a.doctor_id));
        }

        document.getElementById("appointmentCount").textContent =
            todayApps.length + " Appointment" + (todayApps.length !== 1 ? "s" : "") + " Scheduled";

        // ✅ 2. FETCH LAST 30 DAYS APPOINTMENTS (for patient count)
        for (let i = 0; i < 30; i++) {
            const d = new Date(today);
            d.setDate(today.getDate() - i);
            const dateStr = d.toISOString().split("T")[0];

            try {
                const res = await fetch(`${API}/appointments/${dateStr}`);
                if (res.ok) {
                    const data = await res.json();
                    const myApps = data.filter(a => doctorIds.has(a.doctor_id));
                    allAppointments.push(...myApps);
                }
            } catch (e) {}
        }

        // ✅ 3. UNIQUE PATIENT COUNT
        const uniquePatients = new Set(
            allAppointments.map(a => a.patient_id)
        );

        document.getElementById("patientCount").textContent =
            uniquePatients.size + " Patient" + (uniquePatients.size !== 1 ? "s" : "");

    } catch (err) {
        console.error(err);
        document.getElementById("appointmentCount").textContent = "Unable to load";
        document.getElementById("patientCount").textContent = "Unable to load";
    }

});

function logout() {
    localStorage.removeItem("doctor");
    window.location.href = "indexpooja.html";
}

    </script>

</body>

</html>
