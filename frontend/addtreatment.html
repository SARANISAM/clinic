<!DOCTYPE html>
<html>

<head>
    <title>Add Treatment</title>
    <link rel="stylesheet" href="stylep.css">
</head>

<body>

    <div class="sidebar">
        <h2>Doctor Panel</h2>
        <a href="doctordashboard.html">Dashboard</a>
        <a href="doctorappointment.html">Appointments</a>
        <a href="doctorpatients.html">Patients</a>
        <a href="addtreatment.html">Add Treatment</a>
    </div>

    <div class="main">
        <h1>Add Treatment Record</h1>

        <div class="card">
            <form id="treatmentForm">
                <label>Patient</label>
                <select id="patientId" required>
                    <option value="">Select Patient*</option>
                </select>

                <label>Appointment</label>
                <select id="appointmentId" required>
                    <option value="">Select Today's Appointment*</option>
                </select>

                <label>Diagnosis</label>
                <textarea id="diagnosis" required></textarea>

                <label>Prescription</label>
                <textarea id="prescription" required></textarea>

                <label>Notes</label>
                <textarea id="notes"></textarea>

                <label>Follow-up Date</label>
                <input type="date" id="followup">

                <button type="submit">Save Record</button>
            </form>
            <p id="successMessage" style="margin-top:10px;"></p>
        </div>

        <h2 style="margin-top:30px;">Treatment Records</h2>
        <div class="card">
            <table id="treatmentTable" style="width:100%; border-collapse:collapse;">
                <thead>
                    <tr>
                        <th style="padding:10px; text-align:left; border-bottom:1px solid #1e4060;">Patient</th>
                        <th style="padding:10px; text-align:left; border-bottom:1px solid #1e4060;">Appointment ID</th>
                        <th style="padding:10px; text-align:left; border-bottom:1px solid #1e4060;">Diagnosis</th>
                        <th style="padding:10px; text-align:left; border-bottom:1px solid #1e4060;">Prescription</th>
                        <th style="padding:10px; text-align:left; border-bottom:1px solid #1e4060;">Notes</th>
                        <th style="padding:10px; text-align:left; border-bottom:1px solid #1e4060;">Follow-up</th>
                    </tr>
                </thead>
                <tbody id="treatmentTableBody">
                    <tr>
                        <td colspan="6" style="padding:16px; text-align:center; color:#888;">No treatment records yet.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API = "https://clinic-tm9b.onrender.com";
        const patientNames = {};

        document.addEventListener("DOMContentLoaded", async function () {
            const doctor = JSON.parse(localStorage.getItem("doctor"));
            if (!doctor) {
                window.location.href = "indexpooja.html";
                return;
            }

            // 1. Fetch Patients to map names to IDs
            try {
                const pRes = await fetch(`${API}/patients`);
                if (pRes.ok) {
                    const apiPatients = await pRes.json();
                    apiPatients.forEach(p => {
                        patientNames[p.patient_id] = p.name;
                    });
                }
            } catch (e) { console.error("Patient fetch failed", e); }

            // 2. Load Appointments Dropdown from Render
            const selectAppt = document.getElementById("appointmentId");
            const selectPat = document.getElementById("patientId");
            const today = new Date().toISOString().split("T")[0];

            try {
                const aRes = await fetch(`${API}/appointments/${today}`);
                if (aRes.ok) {
                    const todayApps = await aRes.json();

                    selectAppt.innerHTML = '<option value="">Select Today\'s Appointment*</option>';

                    todayApps.forEach(a => {
                        const opt = document.createElement("option");
                        opt.value = a.appointment_id; // Using the UUID from backend
                        const pName = patientNames[a.patient_id] || "Unknown Patient";
                        opt.textContent = `${a.appointment_time} - ${pName}`;
                        selectAppt.appendChild(opt);
                    });
                }
            } catch (e) { console.error("Appointment fetch failed", e); }

            // Populate Patient Dropdown (Using mapping from step 1)
            Object.keys(patientNames).forEach(id => {
                const opt = document.createElement("option");
                opt.value = id;
                opt.textContent = patientNames[id];
                selectPat.appendChild(opt);
            });

            renderTable();

            // 3. Handle Form Submit (POST to /treatments)
            document.getElementById("treatmentForm").addEventListener("submit", async function (e) {
                e.preventDefault();
                const successMessage = document.getElementById("successMessage");

                // PAYLOAD MUST MATCH BACKEND (Line 389 of your code)
                const payload = {
                    appointment_id: document.getElementById("appointmentId").value,
                    diagnosis: document.getElementById("diagnosis").value,
                    prescription: document.getElementById("prescription").value
                };

                try {
                    const response = await fetch(`${API}/treatments`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.message || "Failed to save to database");
                    }

                    // Save locally for the table display
                    const patient_id = document.getElementById("patientId").value;
                    const existing = JSON.parse(localStorage.getItem("treatmentRecords")) || [];
                    existing.unshift({
                        ...payload,
                        patientName: patientNames[patient_id] || "Patient",
                        notes: document.getElementById("notes").value,
                        followup: document.getElementById("followup").value
                    });
                    localStorage.setItem("treatmentRecords", JSON.stringify(existing));

                    successMessage.style.color = "green";
                    successMessage.innerText = "✅ Treatment Record Saved to Supabase!";
                    this.reset();
                    renderTable();

                } catch (err) {
                    console.error("Submission Error:", err);
                    successMessage.style.color = "red";
                    successMessage.innerText = "❌ Error: " + err.message;
                }
            });
        });

        function renderTable() {
            const tbody = document.getElementById("treatmentTableBody");
            const records = JSON.parse(localStorage.getItem("treatmentRecords")) || [];
            tbody.innerHTML = records.length ? "" : '<tr><td colspan="6" style="text-align:center; padding:20px;">No records found.</td></tr>';

            records.forEach(r => {
                const row = document.createElement("tr");
                row.style.borderBottom = "1px solid #1a3a5c";
                // Slice the UUID for display so it doesn't break the table layout
                const shortId = r.appointment_id ? r.appointment_id.substring(0, 8) + "..." : "—";

                row.innerHTML = `
                <td style="padding:10px;">${r.patientName}</td>
                <td style="padding:10px;"><code title="${r.appointment_id}">${shortId}</code></td>
                <td style="padding:10px;">${r.diagnosis}</td>
                <td style="padding:10px;">${r.prescription}</td>
                <td style="padding:10px;">${r.notes || "—"}</td>
                <td style="padding:10px;">${r.followup || "—"}</td>
            `;
                tbody.appendChild(row);
            });
        }
    </script>
</body>

</html>
