<!DOCTYPE html>
<html>

<head>
    <title>Patients</title>
    <link rel="stylesheet" href="stylep.css">
    <style>
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
        }

        .modal-content {
            background-color: #112b44;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 50%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #1e90ff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .modal-content h2 {
            border-bottom: 2px solid #1e90ff;
            padding-bottom: 10px;
            margin-top: 0;
            color: #4db8ff;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #fff;
        }

        .history-item {
            border-bottom: 1px solid #12395c;
            padding: 10px 0;
        }

        .history-item:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>Doctor Panel</h2>
        <a href="doctordashboard.html">Dashboard</a>
        <a href="doctorappointment.html">Appointment</a>
        <a href="doctorpatients.html">Patients</a>
        <a href="addtreatment.html">Add Treatment</a>
    </div>

    <div class="main">
        <h1>Patient List</h1>

        <div id="patientContainer">
            <!-- Dynamic data -->
        </div>

        <!-- Patient History Modal -->
        <div id="historyModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2 id="modalPatientName">Patient History</h2>
                <div id="historyList">
                    <!-- History items will be inserted here -->
                </div>
            </div>
        </div>

    </div>

    <script>
       
const API = "https://clinic-tm9b.onrender.com";

document.addEventListener("DOMContentLoaded", async function () {

    const container = document.getElementById("patientContainer");
    const doctor = JSON.parse(localStorage.getItem("doctor"));

    if (!doctor) {
        window.location.href = "indexpooja.html";
        return;
    }

    // Doctor IDs
    const doctorInfo = Array.isArray(doctor.doctors)
        ? doctor.doctors[0]
        : (doctor.doctors || {});

    const docUserId = doctor.user_id || doctor.name;
    const docDocId = doctorInfo.doctor_id;

    const doctorIds = new Set([docUserId, docDocId].filter(Boolean));

    try {
        const today = new Date();
        let allAppointments = [];

        // ✅ 1. Fetch last 30 days appointments (same logic as dashboard)
        for (let i = 0; i < 30; i++) {
            const d = new Date(today);
            d.setDate(today.getDate() - i);
            const dateStr = d.toISOString().split("T")[0];

            try {
                const res = await fetch(`${API}/appointments/${dateStr}`);
                if (res.ok) {
                    const data = await res.json();

                    const myApps = data.filter(a =>
                        doctorIds.has(a.doctor_id)
                    );

                    allAppointments.push(...myApps);
                }
            } catch (e) {}
        }

        // ✅ 2. Get unique patient IDs
        const patientIds = [...new Set(allAppointments.map(a => a.patient_id))];

        if (!patientIds.length) {
            container.innerHTML = "<div class='card'><p>No patients assigned yet.</p></div>";
            return;
        }

        // ✅ 3. Fetch all patients
        const res = await fetch(`${API}/patients`);
        let allPatients = [];

        if (res.ok) {
            allPatients = await res.json();
        }

        // ✅ 4. Match patients
        const myPatients = patientIds.map(pid => {
            return allPatients.find(p => p.patient_id === pid) || {
                patient_id: pid,
                name: "Unknown Patient"
            };
        });

        // ✅ 5. Render UI
        container.innerHTML = "";

        myPatients.forEach(p => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <p><strong>Name:</strong> ${p.name || "Unknown"}</p>
                <p><strong>Age:</strong> ${p.age || "—"}</p>
                <p><strong>Gender:</strong> ${p.gender || "—"}</p>
                <button onclick="viewHistory('${p.patient_id}', '${p.name}')">
                    View History
                </button>
            `;

            container.appendChild(card);
        });

    } catch (err) {
        console.error(err);
        container.innerHTML = "<div class='card'><p style='color:red;'>Error loading patients</p></div>";
    }
});


// ✅ OPTIONAL: KEEP YOUR EXISTING HISTORY FUNCTION (works with localStorage)
// ✅ UPDATED: FETCH HISTORY FROM LOCAL STORAGE
// ✅ UPDATED: FETCH HISTORY FROM LOCAL STORAGE (Matching Add Treatment structure)
window.viewHistory = function (patientId, patientName) {
    const modal = document.getElementById("historyModal");
    const historyList = document.getElementById("historyList");
    
    modal.style.display = "block";
    historyList.innerHTML = "<p>Searching...</p>";

    // 🔴 CHANGED: Changed 'treatmentRecords' to 'treatmentHistory'
    const rawData = localStorage.getItem("treatmentHistory"); 
    
    if (!rawData) {
        historyList.innerHTML = "<p>No history found in 'treatmentHistory' key.</p>";
        return;
    }

    const localData = JSON.parse(rawData);

    // 🟢 Filter: Note that in your snippet, the key inside the object 
    // might also be different (e.g., patientName vs patientId).
    // Let's check both just in case.
    const myHistory = localData.filter(r => 
        (r.patientId && String(r.patientId) === String(patientId)) || 
        (r.patientName && r.patientName.toLowerCase() === patientName.toLowerCase())
    );

    historyList.innerHTML = ""; 

    if (myHistory.length === 0) {
        historyList.innerHTML = "<p>No matching records for this patient.</p>";
    } else {
        myHistory.forEach(r => {
            historyList.innerHTML += `
                <div style="background:#0d2135; padding:10px; margin-bottom:10px; border-radius:5px; border-left: 3px solid #4db8ff;">
                    <small>${r.date || "No Date"}</small>
                    <p><strong>Diagnosis:</strong> ${r.diagnosis || "N/A"}</p>
                    <p><strong>Prescription:</strong> ${r.prescription || "N/A"}</p>
                </div>`;
        });
    }
};
window.closeModal = function () {
    document.getElementById("historyModal").style.display = "none";
};

window.onclick = function (event) {
    if (event.target == document.getElementById("historyModal")) {
        closeModal();
    }
};

    </script>
</body>

</html>
