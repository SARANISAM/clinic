<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AstraCare Clinic | Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="stylereception.css">

</head>

<body>

<header>
<h1>AstraCare Medical Center</h1>
<p>Create Receptionist Account</p>
</header>

<main style="display:flex;justify-content:center;align-items:center;min-height:70vh;">

<div style="max-width:420px;width:100%;">

<h2 style="text-align:center;margin-bottom:20px;color:gold;">
Receptionist Sign Up
</h2>

<form id="signupForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="text" placeholder="Employee ID" required>

<input type="tel" placeholder="Phone Number" required>

<input type="password" id="password" placeholder="Password" required>

<input type="password" id="confirmPassword" placeholder="Confirm Password" required>

<button type="submit">Create Account</button>

</form>

<p id="message" style="text-align:center;margin-top:15px;"></p>

<p style="text-align:center;margin-top:15px;">
Already have an account?
<a href="receptionist_login.html">Login</a>
</p>

<div style="text-align:center;margin-top:20px;">
<a href="index.html" class="back-button">← Back to Home</a>
</div>

</div>

</main>

<script>

const API_URL = "https://clinic-tm9b.onrender.com";

document.getElementById("signupForm").addEventListener("submit", async function(e) {

  e.preventDefault();

  const name            = document.getElementById("name").value;
  const email           = document.getElementById("email").value;
  const password        = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const messageBox      = document.getElementById("message");

  // PASSWORD MATCH CHECK
  if (password !== confirmPassword) {
    messageBox.style.color = "red";
    messageBox.innerText = "❌ Passwords do not match";
    return;
  }

  try {

    const response = await fetch(`${API_URL}/signup`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, email, password })
    });

    const data = await response.json();

    // CHECK BACKEND MESSAGE
    if (data.message === "Receptionist registered successfully") {
      messageBox.style.color = "green";
      messageBox.innerText = "✅ Account created successfully! Redirecting to login...";
      document.getElementById("signupForm").reset();
      setTimeout(() => window.location.href = "receptionist_login.html", 2000);
    } else {
      messageBox.style.color = "red";
      messageBox.innerText = "❌ " + (data.message || "Signup failed. Try again.");
    }

  } catch (err) {
    messageBox.style.color = "red";
    messageBox.innerText = "❌ Server error. Try again.";
  }

});

</script>

</body>
</html>
