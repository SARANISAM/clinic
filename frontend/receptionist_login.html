<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receptionist Login - AstraCare</title>

<link rel="stylesheet" href="stylereception.css">

<style>

.login-container{
display:flex;
justify-content:center;
align-items:center;
min-height:calc(100vh - 120px);
padding:20px;
}

.login-card{
max-width:400px;
width:100%;
}

.login-title{
text-align:center;
margin-bottom:25px;
color:gold;
}

.signup-link{
text-align:center;
margin-top:15px;
font-size:14px;
}

.signup-link a{
color:#0a1f44;
font-weight:bold;
text-decoration:none;
}

.signup-link a:hover{
color:gold;
}

</style>

</head>

<body>

<header>
<h1>AstraCare Medical Center</h1>
<p>Receptionist Portal Access</p>
</header>

<main class="login-container">

<div class="login-card">

<h2 class="login-title">Sign In</h2>

<form id="loginForm">

<label for="email"
style="display:block;margin-bottom:5px;color:#0a1f44;font-weight:600;">
Email
</label>

<input type="email" id="email" name="email" placeholder="Enter your email" required>

<label for="password"
style="display:block;margin-top:15px;margin-bottom:5px;color:#0a1f44;font-weight:600;">
Password
</label>

<input type="password" id="password" name="password" placeholder="Enter your password" required>

<p id="message" style="text-align:center;margin-top:12px;font-size:14px;"></p>

<button type="submit" style="margin-top:25px;font-weight:bold;">
Login to Dashboard
</button>

</form>

<!-- SIGN UP LINK -->
<div class="signup-link">
Don't have an account?
<a href="signup.html">Sign Up</a>
</div>

<div style="text-align:center;margin-top:20px;">
<a href="index.html" class="back-button">← Back to Clinic Home</a>
</div>

</div>

</main>

<footer style="text-align:center;padding:20px;color:#ccc;font-size:12px;">
© 2026 AstraCare Medical Group. Secure Access.
</footer>

<script>

const API_URL = "https://clinic-tm9b.onrender.com";

document.getElementById("loginForm").addEventListener("submit", async function(e) {

  e.preventDefault();

  const email      = document.getElementById("email").value;
  const password   = document.getElementById("password").value;
  const messageBox = document.getElementById("message");

  try {

    const response = await fetch(`${API_URL}/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (data.message === "Login successful") {
      localStorage.setItem("receptionist", JSON.stringify(data.user));
      messageBox.style.color = "green";
      messageBox.innerText = "✅ Login successful! Redirecting...";
      setTimeout(() => window.location.href = "dashr.html", 1500);
    } else {
      messageBox.style.color = "red";
      messageBox.innerText = "❌ " + (data.message || "Invalid email or password");
    }

  } catch (err) {
    messageBox.style.color = "red";
    messageBox.innerText = "❌ Server error. Please try again.";
  }

});

</script>

</body>
</html>
