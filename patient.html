<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Patient Management - AstraCare</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>AstraCare Medical Center</h1>
    <p>Receptionist - Patient Management</p>
  </header>

  <main>
    <a href="index.html" class="back-button">← Back to Dashboard</a>

    <h2>Register New Patient</h2>
    <form>
      <input type="text" placeholder="Full Name*" required />
      <input type="number" placeholder="Age*" required />
      <select required>
        <option value="">Select Gender*</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
      <input type="text" placeholder="Phone Number*" required />
      <input type="email" placeholder="Email Address" />
      <input type="text" placeholder="Blood Group" />
      <textarea placeholder="Address*" required></textarea>
      <textarea placeholder="Medical History / Allergies"></textarea>
      <button type="submit">Add Patient</button>
    </form>

    <h3>Patient Records</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>Gender</th>
          <th>Phone</th>
          <th>Blood Group</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Mohan Kumar</td>
          <td>11</td>
          <td>Male</td>
          <td>09572181024</td>
          <td>A</td>
          <td><button>View</button></td>
        </tr>
        <tr>
          <td>Sumit Kumar</td>
          <td>12</td>
          <td>Male</td>
          <td>09572181024</td>
          <td>A</td>
          <td><button>View</button></td>
        </tr>
      </tbody>
    </table>
  </main>
</body>
</html>
